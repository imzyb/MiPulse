name = "mipulse"
main = "src/server/index.js"
compatibility_date = "2024-03-31"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "MIPULSE_DB"
database_name = "mipulse_db"

[[kv_namespaces]]
binding = "MIPULSE_KV"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[triggers]
crons = ["*/1 * * * *"]
